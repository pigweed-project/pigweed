# C++ configs:
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_REQUIRES_FULL_LIBCPP=y

# Pigweed modules and sys_io
CONFIG_ZEPHYR_PIGWEED_MODULE=y
CONFIG_PIGWEED_SYS_IO=y
CONFIG_CONSOLE_GETCHAR=y

# Enable Floating Point Unit and Hard ABI to match Rust compiler
CONFIG_FPU=y
CONFIG_FP_HARDABI=y
